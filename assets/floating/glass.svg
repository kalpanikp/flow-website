<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="100%" height="100%">
  <defs>
    <linearGradient id="beerGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E58C00" />
      <stop offset="60%" stop-color="#F2B705" />
      <stop offset="90%" stop-color="#F5D061" />
      <stop offset="100%" stop-color="#FFF2A3" />
    </linearGradient>
    <linearGradient id="foamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F0ECE1" />
    </linearGradient>
    <linearGradient id="glassReflect" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Glow / Ambient Lighting -->
  <ellipse cx="200" cy="400" rx="140" ry="320" fill="#F2B705" opacity="0.12" filter="url(#glow)"/>
  
  <!-- Glass Body (Beer Liquid) -->
  <path d="M 120 180 
           L 135 600 
           Q 140 650, 200 650 
           Q 260 650, 265 600 
           L 280 180 Z" 
        fill="url(#beerGrad)" />
        
  <!-- Foam Head -->
  <path d="M 115 160 
           Q 115 130, 140 130 
           Q 160 130, 175 145 
           Q 195 125, 225 125 
           Q 250 125, 260 145 
           Q 275 135, 285 150 
           Q 290 160, 280 185 
           L 120 185 
           Q 110 175, 115 160 Z" 
        fill="url(#foamGrad)" />
        
  <!-- Glass Rim & Outline -->
  <path d="M 118 160 
           L 133 600 
           Q 138 653, 200 653 
           Q 262 653, 267 600 
           L 282 160" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="4" 
        stroke-linecap="round" 
        opacity="0.8" />
        
  <!-- Base Stem of Glass (Solid Glass Bottom) -->
  <path d="M 135 600 
           Q 138 650, 200 650 
           Q 262 650, 265 600 
           Q 260 690, 200 690 
           Q 140 690, 135 600 Z" 
        fill="#ffffff" 
        opacity="0.2" />
        
  <path d="M 160 688 
           L 165 740 
           Q 165 750, 140 750 
           L 260 750 
           Q 235 750, 235 740 
           L 240 688 Z" 
        fill="#ffffff" 
        opacity="0.25" />
        
  <!-- Bubbles inside Beer -->
  <g fill="#FFFFFF" opacity="0.6">
    <circle cx="160" cy="550" r="4" />
    <circle cx="170" cy="580" r="3" />
    <circle cx="230" cy="520" r="5" />
    <circle cx="240" cy="570" r="3" />
    <circle cx="190" cy="450" r="6" />
    <circle cx="210" cy="480" r="4" />
    <circle cx="150" cy="380" r="3.5" />
    <circle cx="250" cy="340" r="5" />
    <circle cx="180" cy="280" r="4" />
    <circle cx="220" cy="240" r="6" />
    <circle cx="200" cy="320" r="3" />
    <circle cx="165" cy="480" r="2.5" />
    <circle cx="235" cy="420" r="3.5" />
    <circle cx="185" cy="590" r="4" />
  </g>

  <!-- Dynamic Glass Highlights / Reflections -->
  <path d="M 125 190 
           L 138 580 
           Q 140 610, 170 625" 
        fill="none" 
        stroke="url(#glassReflect)" 
        stroke-width="8" 
        stroke-linecap="round" 
        opacity="0.5" />
        
  <path d="M 275 190 
           L 262 580 
           Q 260 610, 230 625" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="2" 
        stroke-linecap="round" 
        opacity="0.3" />
        
  <!-- Condensation Droplets on Glass Exterior -->
  <g fill="#FFFFFF" opacity="0.4">
    <ellipse cx="145" cy="300" rx="3" ry="5" />
    <ellipse cx="147" cy="308" rx="1.5" ry="2.5" />
    <ellipse cx="255" cy="420" rx="4" ry="6" />
    <ellipse cx="175" cy="220" rx="3" ry="5" />
    <ellipse cx="225" cy="490" rx="2.5" ry="4" />
  </g>
</svg>
