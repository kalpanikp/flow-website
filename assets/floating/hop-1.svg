<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 300" width="100%" height="100%">
  <defs>
    <!-- Gradual deep forest greens to vibrant hops greens -->
    <linearGradient id="hopBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4E8752" />
      <stop offset="100%" stop-color="#1B431E" />
    </linearGradient>
    <linearGradient id="hopLeafLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#83C287" />
      <stop offset="100%" stop-color="#3D7541" />
    </linearGradient>
    <linearGradient id="hopLeafDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3E7C43" />
      <stop offset="100%" stop-color="#173B1B" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Stem -->
  <path d="M 125 15 L 125 55 Q 125 70, 115 80" fill="none" stroke="#689E6B" stroke-width="8" stroke-linecap="round" />

  <!-- Hop Body Container with filter -->
  <g filter="url(#shadow)">
    <!-- Back Row Scales -->
    <path d="M 90 90 Q 60 110, 85 140 Q 110 140, 110 100 Z" fill="url(#hopLeafDark)" />
    <path d="M 160 90 Q 190 110, 165 140 Q 140 140, 140 100 Z" fill="url(#hopLeafDark)" />
    
    <!-- Middle Row Scales -->
    <path d="M 75 125 Q 40 155, 75 190 Q 110 185, 105 140 Z" fill="url(#hopLeafLight)" opacity="0.95" />
    <path d="M 175 125 Q 210 155, 175 190 Q 140 185, 145 140 Z" fill="url(#hopLeafLight)" opacity="0.95" />
    <path d="M 125 100 Q 95 130, 125 165 Q 155 130, 125 100 Z" fill="url(#hopLeafLight)" />

    <!-- Foreground Scales -->
    <path d="M 90 160 Q 60 200, 95 240 Q 130 230, 120 180 Z" fill="url(#hopLeafDark)" />
    <path d="M 160 160 Q 190 200, 155 240 Q 120 230, 130 180 Z" fill="url(#hopLeafDark)" />
    
    <path d="M 125 155 Q 95 195, 125 240 Q 155 195, 125 155 Z" fill="url(#hopLeafLight)" />
    
    <!-- Bottom Tip Scales -->
    <path d="M 105 220 Q 80 250, 125 285 Q 140 270, 135 235 Z" fill="url(#hopLeafDark)" />
    <path d="M 145 220 Q 170 250, 125 285 Q 110 270, 115 235 Z" fill="url(#hopLeafLight)" />
    <path d="M 125 225 Q 105 250, 125 280 Q 145 250, 125 225 Z" fill="#88CD8C" />
  </g>

  <!-- Delicate veins on key scale for realistic/premium vector look -->
  <path d="M 125 155 Q 125 210, 125 235" fill="none" stroke="#A9DFA9" stroke-width="2" stroke-opacity="0.6" />
  <path d="M 125 185 Q 110 195, 105 205" fill="none" stroke="#A9DFA9" stroke-width="1.5" stroke-opacity="0.5" />
  <path d="M 125 195 Q 140 205, 145 215" fill="none" stroke="#A9DFA9" stroke-width="1.5" stroke-opacity="0.5" />
</svg>
